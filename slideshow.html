<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Revolution - 10 Minute Slideshow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #container {
            position: relative;
            width: 1280px;
            height: 720px;
            overflow: hidden;
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #image-container {
            width: 100%;
            height: 100%;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        .slide.active {
            display: block;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background-color: #00BFFF;
            transition: width 0.3s ease;
            z-index: 10;
        }
        #timer {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background-color: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
        }
        #slide-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background-color: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            z-index: 10;
        }
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 24px;
            background-color: #00BFFF;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
        }
        #start-btn:hover {
            background-color: #009ACD;
        }
        #start-btn.hidden {
            display: none;
        }
        /* Fade transition effect */
        .fade {
            animation-name: fade;
            animation-duration: 1s;
        }
        @keyframes fade {
            from {opacity: 0}
            to {opacity: 1}
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="image-container">
            <!-- Slides will be generated by JavaScript -->
        </div>
        <div id="progress"></div>
        <div id="timer">00:00</div>
        <div id="slide-info">Press Start to begin</div>
        <button id="start-btn">▶ START SLIDESHOW</button>
    </div>

    <script>
        // Configuration
        const totalDuration = 600; // 10 minutes in seconds
        const numSlides = 19;
        const audioFiles = [
            { file: 'audio/intro.mp3', duration: 30, title: 'Introduction' },
            { file: 'audio/part1_1.mp3', duration: 42, title: 'Financial Crisis' },
            { file: 'audio/part1_2.mp3', duration: 36, title: 'The Three Estates' },
            { file: 'audio/part1_3.mp3', duration: 40, title: 'Estates General' },
            { file: 'audio/part1_4.mp3', duration: 36, title: 'National Assembly' },
            { file: 'audio/part1_5.mp3', duration: 48, title: 'Tennis Court Oath' },
            { file: 'audio/part2_1.mp3', duration: 36, title: 'Storming the Bastille' },
            { file: 'audio/part2_2.mp3', duration: 42, title: 'Victory!' },
            { file: 'audio/part2_3.mp3', duration: 48, title: 'Rights of Man' },
            { file: 'audio/part2_3.mp3', duration: 48, title: 'Equal Rights' },
            { file: 'audio/part2_4.mp3', duration: 36, title: "Women's March" },
            { file: 'audio/part2_5.mp3', duration: 48, title: "King's Execution" },
            { file: 'audio/part3_1.mp3', duration: 42, title: 'Reign of Terror' },
            { file: 'audio/part3_2.mp3', duration: 42, title: 'Guillotine\'s Shadow' },
            { file: 'audio/part3_3.mp3', duration: 42, title: 'Robespierre Falls' },
            { file: 'audio/part3_4.mp3', duration: 36, title: 'The Directory' },
            { file: 'audio/part3_5.mp3', duration: 48, title: 'Napoleon Rises' },
            { file: 'audio/outro.mp3', duration: 36, title: 'Conclusion' }
        ];

        let currentSlide = 0;
        let accumulatedTime = 0;
        let startTime = null;
        let isPlaying = false;
        let slideTimers = [];
        let audioElements = [];

        // Initialize slides
        function initSlides() {
            const container = document.getElementById('image-container');
            for (let i = 0; i < numSlides; i++) {
                const slide = document.createElement('div');
                slide.className = 'slide fade';
                slide.id = `slide-${i}`;

                const img = document.createElement('img');
                img.src = `images/image00${i + 1}.jpg`;
                img.alt = `Slide ${i + 1}`;

                slide.appendChild(img);
                container.appendChild(slide);

                // Create audio element for this slide
                if (audioFiles[i]) {
                    const audio = new Audio(audioFiles[i].file);
                    audioElements.push(audio);
                }
            }
        }

        // Show specific slide
        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, i) => {
                if (i === index) {
                    slide.style.display = 'block';
                    slide.classList.add('active');
                } else {
                    slide.style.display = 'none';
                    slide.classList.remove('active');
                }
            });
        }

        // Update progress bar
        function updateProgress(elapsedTime) {
            const progressPercent = (elapsedTime / totalDuration) * 100;
            document.getElementById('progress').style.width = `${progressPercent}%`;
        }

        // Update timer display
        function updateTimer(elapsedTime) {
            const minutes = Math.floor(elapsedTime / 60);
            const seconds = Math.floor(elapsedTime % 60);
            document.getElementById('timer').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Update slide info
        function updateSlideInfo() {
            if (audioFiles[currentSlide]) {
                document.getElementById('slide-info').textContent =
                    `${currentSlide + 1} / ${numSlides} - ${audioFiles[currentSlide].title}`;
            }
        }

        // Play audio for current slide
        function playCurrentAudio() {
            // Stop all audio
            audioElements.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });

            // Play current audio if available
            if (audioElements[currentSlide]) {
                audioElements[currentSlide].play().catch(e => {
                    console.log('Audio autoplay blocked:', e);
                });
            }
        }

        // Advance to next slide
        function nextSlide() {
            accumulatedTime += audioFiles[currentSlide].duration;

            if (currentSlide < numSlides - 1) {
                currentSlide++;
                showSlide(currentSlide);
                updateSlideInfo();
                playCurrentAudio();

                // Schedule next slide
                const slideDuration = audioFiles[currentSlide].duration * 1000;
                const timer = setTimeout(nextSlide, slideDuration);
                slideTimers.push(timer);
            } else {
                // End of slideshow
                isPlaying = false;
                updateProgress(totalDuration);
                updateTimer(totalDuration);
                document.getElementById('slide-info').textContent = 'Presentation Complete!';
            }
        }

        // Main loop
        function gameLoop(timestamp) {
            if (!isPlaying) return;

            if (!startTime) startTime = timestamp;
            const elapsedTime = (timestamp - startTime) / 1000;

            updateProgress(Math.min(elapsedTime, totalDuration));
            updateTimer(Math.min(elapsedTime, totalDuration));

            if (elapsedTime < totalDuration) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Start slideshow
        function startSlideshow() {
            document.getElementById('start-btn').classList.add('hidden');

            // Reset state
            currentSlide = 0;
            accumulatedTime = 0;
            startTime = null;
            isPlaying = true;

            // Clear any existing timers
            slideTimers.forEach(timer => clearTimeout(timer));
            slideTimers = [];

            // Show first slide
            showSlide(0);
            updateSlideInfo();
            playCurrentAudio();

            // Schedule first transition
            const firstSlideDuration = audioFiles[0].duration * 1000;
            const timer = setTimeout(nextSlide, firstSlideDuration);
            slideTimers.push(timer);

            // Start main loop
            requestAnimationFrame(gameLoop);
        }

        // Event listener
        document.getElementById('start-btn').addEventListener('click', startSlideshow);

        // Initialize on load
        window.addEventListener('load', () => {
            initSlides();
            showSlide(0);
            updateSlideInfo();
        });
    </script>
</body>
</html>
