<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIOlingo - Redirecting...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2em;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 TRIOlingo</h1>
        <div class="spinner"></div>
        <p>Redirecting to the app...</p>
        <p style="font-size: 0.9em; margin-top: 20px; opacity: 0.8;">
            If not redirected, <a href="triolingo/" style="color: white; text-decoration: underline;">click here</a>
        </p>
    </div>
    <script>
        // Redirect to triolingo folder
        window.location.href = 'triolingo/';
    </script>
</body>
</html>
