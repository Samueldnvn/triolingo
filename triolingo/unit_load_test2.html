<!DOCTYPE html>
<html>
<head>
    <title>Unit Load Test 2</title>
</head>
<body>
    <h1>Unit Load Test 2</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');

        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.style.color = isError ? 'red' : 'green';
            div.textContent = msg;
            output.appendChild(div);
            console.log(msg);
        }

        log('Starting unit load test...');

        // Test: Directly inline the code from the file
        log('Testing inline code...');

        // Load the file via fetch to see what's actually in it
        fetch('questions/linearAlgebraUnit1-VectorSpaces.js?t=' + Date.now())
            .then(response => {
                log('✅ File fetched! Status: ' + response.status);
                return response.text();
            })
            .then(code => {
                log('✅ Got code! Length: ' + code.length + ' chars');
                log('First 200 chars: ' + code.substring(0, 200));

                // Try to eval it
                try {
                    eval(code);
                    log('✅ Code evaluated successfully!');

                    setTimeout(function() {
                        if (window.linearAlgebraUnit1) {
                            log('✅ linearAlgebraUnit1 is defined: ' + linearAlgebraUnit1.unitName);
                        } else {
                            log('❌ linearAlgebraUnit1 is NOT defined after eval!', true);
                            log('window.linearAlgebraUnit1: ' + typeof window.linearAlgebraUnit1);
                        }
                    }, 100);
                } catch (e) {
                    log('❌ Error evaluating code: ' + e.message, true);
                }
            })
            .catch(error => {
                log('❌ Error fetching file: ' + error.message, true);
            });
    </script>
</body>
</html>
