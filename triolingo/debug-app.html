<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triolingo - Debug Mode</title>
  <link rel="stylesheet" href="styles.css">
  <!-- MathJax for math notation -->
  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)']],
      displayMath: [['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div id="debug-output" style="position: fixed; top: 0; left: 0; width: 300px; background: black; color: white; z-index: 10000; max-height: 90vh; overflow-y: auto; font-family: monospace; font-size: 12px; padding: 10px;">
    <div style="background: #333; padding: 5px; cursor: pointer;" onclick="document.getElementById('debug-output').style.display='none'">
      <strong>Debug Log (click to close)</strong>
    </div>
  </div>

  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <h1>Triolingo</h1>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-view="learn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
          <span>Learn</span>
        </button>
        <button class="nav-item" data-view="progress">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          <span>Progress</span>
        </button>
        <button class="nav-item" data-view="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span>Settings</span>
        </button>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="header-left">
          <h2 id="header-title">Triolingo</h2>
        </div>
        <div class="header-right">
          <div class="course-selector">
            <select id="courseSelect" onchange="changeLanguage(this.value)">
              <option value="french">🇫🇷 French</option>
              <option value="spanish">🇪🇸 Spanish</option>
              <option value="calculus">📐 Calculus 1-3</option>
            </select>
          </div>
        </div>
      </header>

      <div id="view-container">
        <!-- Views will be injected here -->
      </div>
    </main>
  </div>

  <script>
    // Debug logging
    const debugLog = document.getElementById('debug-output');
    function debug(msg, isError = false) {
      const time = new Date().toLocaleTimeString();
      const color = isError ? '#ff6b6b' : '#51cf66';
      debugLog.innerHTML += `<div style="color: ${color}; border-bottom: 1px solid #444; padding: 2px 0;">[${time}] ${msg}</div>`;
      debugLog.scrollTop = debugLog.scrollHeight;
      console.log(msg);
    }
    window.onerror = function(msg, url, line, col, error) {
      debug(`ERROR: ${msg} at ${url}:${line}:${col}`, true);
      return false;
    };
    debug('Debug mode enabled');
  </script>

  <script src="themeManager.js"></script>
  <script>
    debug('✅ themeManager.js loaded');
  </script>

  <script src="soundManager.js"></script>
  <script>
    debug('✅ soundManager.js loaded');
  </script>

  <script src="spanishVocab.js"></script>
  <script>
    debug('✅ spanishVocab.js loaded (' + Object.keys(courses).length + ' courses)');
  </script>

  <script src="lessonGenerators.js"></script>
  <script>
    debug('✅ lessonGenerators.js loaded');
  </script>

  <script src="calculusVocab.js"></script>
  <script>
    debug('✅ calculusVocab.js loaded');
  </script>

  <script src="calculusIcons.js"></script>
  <script>
    debug('✅ calculusIcons.js loaded (' + Object.keys(CalculusIconMap).length + ' icon mappings)');
  </script>

  <script src="calculusIconsExternal.js"></script>
  <script>
    debug('✅ calculusIconsExternal.js loaded (' + Object.keys(CalculusExternalIconMap).length + ' external mappings)');
  </script>

  <script src="calculusGenerators_comprehensive.js"></script>
  <script>
    debug('✅ calculusGenerators_comprehensive.js loaded');
    try {
      const testLesson = CalculusPlaceholderLessons.limits1();
      debug('✅ Test lesson generated: ' + testLesson.title);
    } catch (e) {
      debug('❌ Lesson generation failed: ' + e.message, true);
    }
  </script>

  <script src="ttsManager.js"></script>
  <script>
    debug('✅ ttsManager.js loaded');
  </script>

  <script src="app.js"></script>
  <script>
    debug('✅ app.js loaded');
    debug('Calling init()...');
    init().then(() => {
      debug('✅ init() completed successfully');
    }).catch(err => {
      debug('❌ init() failed: ' + err.message, true);
      console.error(err);
    });
  </script>
</body>
</html>
