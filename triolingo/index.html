<!-- Map Picker Modal -->
<div id="mp-map-picker" class="mp-picker-modal" style="display:none">
  <div class="mp-picker-inner">
    <div class="mp-picker-toolbar">
      <div class="mp-picker-search-row">
        <input id="mp-picker-search" type="text" placeholder="Search location… (or leave blank for custom map)"
               onkeydown="if(event.key==='Enter')MPPicker.search()">
        <button class="mp-picker-btn" onclick="MPPicker.search()">🔍 Search</button>
      </div>
      <div class="mp-picker-layer-row">
        <span class="mp-picker-layer-label">Map type:</span>
        <button class="mp-picker-layer-btn active" id="layer-satellite" onclick="MPPicker.setLayer('satellite')">🛰 Satellite</button>
        <button class="mp-picker-layer-btn" id="layer-street"    onclick="MPPicker.setLayer('street')">🗺 Street</button>
        <button class="mp-picker-layer-btn" id="layer-topo"      onclick="MPPicker.setLayer('topo')">⛰ Topo</button>
        <button class="mp-picker-layer-btn" id="layer-dark"      onclick="MPPicker.setLayer('dark')">🌑 Dark</button>
        <button class="mp-picker-layer-btn" id="layer-ocean"     onclick="MPPicker.setLayer('ocean')">🌊 Ocean</button>
      </div>
      <div class="mp-picker-url-row">
        <span class="mp-picker-layer-label">Paste image URL:</span>
        <input id="mp-picker-url" type="text" placeholder="https://… (any image URL)">
        <button class="mp-picker-btn" onclick="MPPicker.useUrl()">Use Image</button>
      </div>
      <!-- Tab switcher -->
      <div class="mp-picker-tabs">
        <button class="mp-picker-tab active" id="mp-tab-map" onclick="MPPicker.switchTab('map')">🗺 Map Browser</button>
        <button class="mp-picker-tab" id="mp-tab-search" onclick="MPPicker.switchTab('search')">🔍 Search Maps</button>
      </div>
    </div>

    <!-- Map Browser tab -->
    <div id="mp-picker-map-pane">
      <div id="mp-picker-map"></div>
      <div class="mp-picker-footer">
        <span class="mp-picker-hint">Navigate to any area, then click Capture.</span>
        <button class="mp-picker-btn mp-picker-cancel" onclick="MPPicker.close()">Cancel</button>
        <button class="mp-picker-btn mp-picker-capture" onclick="MPPicker.capture()">📸 Capture This View</button>
      </div>
    </div>

    <!-- Image Search tab -->
    <div id="mp-picker-search-pane" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="mp-imgsearch-bar">
        <input id="mp-imgsearch-q" type="text" placeholder="Search for any map… e.g. IKEA floor plan, Hogwarts map, Fallout 4 map"
               onkeydown="if(event.key==='Enter')MPPicker.imageSearch()">
        <button class="mp-picker-btn mp-picker-capture" onclick="MPPicker.imageSearch()">Search</button>
        <button class="mp-picker-btn mp-picker-cancel" onclick="MPPicker.close()">Cancel</button>
      </div>
      <div id="mp-imgsearch-status" class="mp-imgsearch-status"></div>
      <div id="mp-imgsearch-results" class="mp-imgsearch-results"></div>
    </div>
  </div>
</div>
